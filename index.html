<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Wordly</title>

    <script src="index.js" defer></script>

</head>

<body>

    <h1 id="wordly">Wordly</h1>

    <form id="input-form" action="">

        <input id="input-box" type="text" placeholder="Type word...">
        <input id="input-button" type="submit">
        <button id="reset-button">Reset</button>

    </form>

    <div id="main-container">

        <div id="history-container">

            <h2 id="search-history">Search History:</h2>

            <ul id="history-list">



            </ul>

        </div>

        <div id="word-container">

            <h2 id="word-card">Word:</h2>

            <!-- example: <h1>searched Word</h1> -->

        </div>

    </div>

</body>

</html>
